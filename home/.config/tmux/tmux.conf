# Claude Code Workspace — tmux configuration
# ~/.config/tmux → ~/dotfiles/home/.config/tmux （GNU stow で配置）

# ─── Prefix ─────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Terminal & Colors ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ─── Behavior ────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on
setw -g mode-keys vi
set -g display-time 2000
set -g status-keys vi

# ─── Reload ──────────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Config reloaded"

# ─── Pane Navigation (vim-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl+hjkl for quick nav (no prefix) — aware of vim/nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ─── Pane / Window Management ────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind z resize-pane -Z

# Alt+N で直接ウィンドウジャンプ（プレフィックスなし）
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-p previous-window
bind -n M-n next-window

# ─── Copy Mode ───────────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ─── Claude Code Popups ──────────────────────────────────────────────────────
# T: ファイルツリー
bind T display-popup -w 75% -h 85% -d "#{pane_current_path}" \
  -E "$HOME/.config/tmux/scripts/cc-tree.sh"

# D: ダッシュボード（進捗・状態）
bind D display-popup -w 80% -h 85% -d "#{pane_current_path}" \
  -E "$HOME/.config/tmux/scripts/cc-dashboard.sh"

# M: Markdownビューア
bind M display-popup -w 85% -h 90% -d "#{pane_current_path}" \
  -E "$HOME/.config/tmux/scripts/cc-mdview.sh"

# G: Gitログ
bind G display-popup -w 80% -h 80% -d "#{pane_current_path}" \
  -E "git log --oneline --graph --color=always 2>/dev/null | head -80 | less -R"

# W: Claude ワークスペース起動
bind W run-shell "$HOME/.config/tmux/scripts/cc-workspace.sh"

# S: セッション切替 (fzf)
bind S display-popup -w 50% -h 40% \
  -E "tmux list-sessions | fzf --reverse --header 'セッション切替 (Enter)' \
      | cut -d: -f1 | xargs -r tmux switch-client -t"

# ?: ヘルプ (Chrome で開く)
bind ? run-shell "$HOME/.config/tmux/scripts/cc-help.sh"

# ─── Status Bar ── Catppuccin Mocha ──────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style          "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length    25
set -g status-right-length   90

set -g status-left  "#[bg=#cba6f7,fg=#1e1e2e,bold] #{session_name} #[bg=#1e1e2e,fg=#cba6f7] "
set -g status-right "#[fg=#45475a] #{b:pane_current_path} #[fg=#585b70]│ %m/%d %H:%M #[fg=#cba6f7]│ #[fg=#cba6f7,bold]#h "

setw -g window-status-format         "#[fg=#45475a,bg=#1e1e2e] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold] #I #[fg=#cdd6f4]#W #[fg=#313244,bg=#1e1e2e] "
setw -g window-status-separator      ""

set -g message-style         "bg=#f9e2af,fg=#1e1e2e,bold"
set -g message-command-style "bg=#f9e2af,fg=#1e1e2e"
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# ─── Plugins (tpm) ───────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# TPM は XDG 設定(~/.config/tmux/tmux.conf)を検出すると plugins を
# ~/.config/tmux/plugins/ に置く。ロード元もそこに合わせる（実体とズレ防止）。
# プラグイン本体は .gitignore で非追跡（TPM で再生成可能）。
if-shell "test -f ~/.config/tmux/plugins/tpm/tpm" "run '~/.config/tmux/plugins/tpm/tpm'"
